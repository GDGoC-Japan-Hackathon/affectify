version: v2
plugins:
  # Go: protobuf messages
  - local: protoc-gen-go
    out: ../backend/gen
    opt: paths=source_relative
  # Go: Connect service stubs
  - local: protoc-gen-connect-go
    out: ../backend/gen
    opt: paths=source_relative
  # TypeScript: protobuf messages
  - local: ../frontend/node_modules/.bin/protoc-gen-es
    out: ../frontend/src/gen
    opt: target=ts
  # TypeScript: Connect service stubs
  - local: ../frontend/node_modules/.bin/protoc-gen-connect-es
    out: ../frontend/src/gen
    opt: target=ts

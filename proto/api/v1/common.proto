syntax = "proto3";

package api.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/GDGoC-Japan-Hackathon/affectify/backend/gen/api/v1;apiv1";

message UserSummary {
  int64 id = 1;
  string email = 2;
  string name = 3;
  string avatar_url = 4;
}

message ProjectMember {
  int64 project_id = 1;
  int64 user_id = 2;
  int64 added_by = 3;
  string role = 4;
  google.protobuf.Timestamp joined_at = 5;
  UserSummary user = 6;
  UserSummary added_by_user = 7;
}

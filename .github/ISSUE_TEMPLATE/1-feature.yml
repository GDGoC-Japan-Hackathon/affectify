name: Feature Report
description: File a new feature report.
title: "[Feature]: "
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        新規機能開発に関するISSUE記載
  - type: textarea
    id: about-feature
    attributes:
      label: ISSUE概要
      description: 機能概要を書いてください.
      placeholder: 〇〇の開発をする.
    validations:
      required: true
  - type: textarea
    id: todo-feature
    attributes:
      label: TODOs
      description: TODOリストを書いてください.
      placeholder: 〇〇を実装する.
    validations:
      required: false
  - type: textarea
    id: version
    attributes:
      label: バージョン
      description: リリース予定バージョン
      placeholder: version X.X.X
    validations:
      required: false
  - type: dropdown
    id: browsers
    attributes:
      label: どの端末で検証する必要がありますか?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - iOS
        - Android
  - type: textarea
    id: other-feature
    attributes:
      label: 備考
      description: その他で記載すること.
      placeholder: 特になし.
    validations:
      required: false

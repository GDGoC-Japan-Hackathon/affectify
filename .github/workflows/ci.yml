name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  branch-policy:
    name: Branch policy check
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source branch for main
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ] && [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Pull requests to main must come from develop."
            exit 1
          fi

  proto:
    name: Proto lint & format check
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - run: buf lint
        working-directory: proto
      - run: buf format --diff --exit-code
        working-directory: proto

  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: Install Atlas CLI
        run: curl -sSf https://atlasgo.sh | sh
      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
      - name: Generate code (Go only)
        run: |
          buf generate --template buf.gen.go.yaml
        working-directory: proto
      - name: Generate GORM query code
        run: go run ./cmd/genorm
        working-directory: backend
      - name: Verify Atlas schema loader
        run: go run ./cmd/atlasschema > /dev/null
        working-directory: backend
      - name: Verify Atlas migration hashes(マイグレーションファイルが不正に書き換えられてたりの対策)
        run: atlas migrate hash --dir file://migrations
        working-directory: backend
      - name: Verify Atlas migrations are up to date(entityからのマイグレーションを忘れていないか確認)
        run: atlas migrate diff ci_drift_check --env local
        working-directory: backend
      - name: Verify generated code is committed
        run: git diff --exit-code
      - name: Build
        run: go build ./...
        working-directory: backend
      - name: Test
        run: go test ./...
        working-directory: backend

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Generate code (TS only)
        run: |
          buf generate --template buf.gen.ts.yaml
        working-directory: proto
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Build
        run: bun run build
        working-directory: frontend

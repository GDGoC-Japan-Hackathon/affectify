services:
  postgres:
    image: postgres:17
    container_name: affectify-postgres
    environment:
      POSTGRES_DB: affectify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d affectify"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
